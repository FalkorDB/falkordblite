name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to PyPI (true/false)'
        required: false
        default: 'false'

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]  # macos-latest is ARM64 (Apple Silicon)
        python-version: ['3.12', '3.13', '3.14']
    
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    
    - name: Load versions
      run: cat versions.cfg >> $GITHUB_ENV
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: requirements.txt
    
    - name: Cache Redis submodule
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: redis.submodule
        key: redis-${{ env.REDIS_VERSION }}-${{ runner.os }}-${{ runner.arch }}
    
    - name: Cache FalkorDB module
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: falkordb.so
        key: falkordb-${{ env.FALKORDB_VERSION }}-${{ runner.os }}-${{ runner.arch }}
    
    - name: Install build dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc make python3-dev
    
    - name: Install build dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install gcc make libomp
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel build
        pip install -r requirements.txt
    
    - name: Install auditwheel (Linux)
      if: runner.os == 'Linux'
      run: pip install auditwheel
    
    - name: Install delocate (macOS)
      if: runner.os == 'macOS'
      run: pip install delocate
    
    - name: Build package
      run: |
        python setup.py build
    
    - name: Build wheel
      run: |
        python setup.py bdist_wheel
    
    - name: Repair wheel with auditwheel (Linux)
      if: runner.os == 'Linux'
      run: |
        auditwheel repair dist/*.whl -w dist/
        rm dist/*-linux_*.whl  # Remove the original unrepaired wheel
    
    - name: Repair wheel with delocate (macOS)
      if: runner.os == 'macOS'
      run: |
        # delocate-wheel modifies wheels in place to bundle dependencies.
        # This is similar to auditwheel on Linux but for macOS.
        # Unlike auditwheel, we do not remove the original wheel here because delocate modifies the wheel in place,
        # so there is no unrepaired wheel to remove.
        delocate-wheel -v dist/*.whl
    
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: wheel-${{ matrix.os }}-${{ matrix.python-version }}
        path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'
        cache: pip
        cache-dependency-path: requirements.txt
    
    - name: Build sdist
      run: |
        python -m pip install --upgrade pip build
        python -m build --sdist
    
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: sdist
        path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.publish == 'true'
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
      contents: read
    
    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        pattern: "*"
        path: dist
        merge-multiple: true
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      with:
        attestations: true
    
    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: release-packages
        path: dist/*
